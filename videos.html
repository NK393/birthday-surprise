<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories 🎥</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0 10px 0;
    color:#ffcc80;
}

/* UPLOAD BUTTON */
.upload-container {
    margin: 20px auto;
}
.upload-btn {
    display: inline-block;
    padding: 12px 24px;
    background: #ffcc80;
    color: #111;
    font-size: 16px;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(255, 204, 128, 0.2);
}
.upload-btn:hover {
    background: #ffe0b2;
    transform: scale(1.05);
}
input[type="file"] {
    display: none;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:10px;
    padding:10px;
}

/* VIDEO BOX */
.video-box{
    width:100%;
    aspect-ratio:1/1;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* NOTE */
.quote{
    margin:30px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffcc80;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>🎥 Memories 🎥</h1>

<div class="upload-container">
    <label for="video-upload" class="upload-btn">📂 Load All Videos</label>
    <input type="file" id="video-upload" multiple accept="video/mp4,video/quicktime" />
</div>

<div class="gallery" id="gallery"></div>

<div class="quote">
💛 Every video is a memory captured in time ✨
</div>

<script>
const uploadInput = document.getElementById("video-upload");
const gallery = document.getElementById("gallery");

uploadInput.addEventListener("change", (event) => {
    // Clear the gallery if files are re-selected
    gallery.innerHTML = ""; 

    // Convert file list to an array and sort alphabetically by name
    const files = Array.from(event.target.files);
    files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

    files.forEach(file => {
        // Ensure it's actually a video file
        if (!file.type.startsWith("video/")) return;

        const div = document.createElement("div");
        div.className = "video-box";

        const video = document.createElement("video");
        video.controls = true;

        // Creates a temporary local URL for the file to play directly in browser
        const videoURL = URL.createObjectURL(file);
        video.src = videoURL;

        div.appendChild(video);
        gallery.appendChild(div);
    });
});
</script>

</body>
</html>
