<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Adhu ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
rgba(0,0,0,0.45),
rgba(0,0,0,0.45)
),
url('images/Background.jfif');

background-size:cover;
background-position:center;
background-attachment:fixed;

font-family:Georgia, serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
}

.glass{

width:100%;
max-width:500px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.2);

border-radius:30px;

padding:35px;

text-align:center;

color:white;

box-shadow:
0 0 40px rgba(255,105,180,0.3);

}

h1{

font-size:48px;

margin-bottom:10px;

text-shadow:0 0 15px pink;

}

.name{

font-size:65px;

font-style:italic;

color:#ffd6e7;

margin-bottom:20px;

}

.subtitle{

font-size:20px;

margin-bottom:25px;

}

.counter{

font-size:70px;

font-weight:bold;

color:#ffd6e7;

text-shadow:0 0 15px pink;

}

.days{

font-size:22px;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:15px;

margin-top:15px;

}

button{

margin-top:20px;

padding:15px 35px;

border:none;

border-radius:20px;

background:#ff4f88;

color:white;

font-size:20px;

cursor:pointer;

box-shadow:0 0 20px #ff4f88;

}

button:hover{

transform:scale(1.05);

}

.quote{

margin-top:30px;

font-size:22px;

font-style:italic;

color:#ffe5ef;

}

audio{

width:100%;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="glass">

<audio id="bgMusic" controls loop>
<source src="music/Un_Vizhigalil.mp3" type="audio/mpeg">
</audio>

<h1>Happy Birthday</h1>

<div class="name">
Adhu ❤️
</div>

<div class="subtitle">
Every memory with you is my favorite place to live
</div>

<div id="counter" class="counter">
0
</div>

<div class="days">
Days Together ❤️
</div>

<p>
Choose the date our story began
</p>

<input
type="date"
id="datePicker">

<button onclick="checkDate()">
Unlock My Heart ❤️
</button>

<div class="quote">
"You are my today and all of my tomorrows"
</div>

</div>

<script>

const startDate =
new Date("2024-09-30");

const today =
new Date();

const diff =
today-startDate;

const days =
Math.floor(
diff/(1000*60*60*24)
);

document.getElementById("counter")
.innerHTML = days;

function checkDate(){

document
.getElementById("bgMusic")
.play();

const selected =
document.getElementById("datePicker").value;

if(selected==="2024-09-30"){

window.location.href="menu.html";

}
else{

alert("Wrong Date ❤️");

}

}

</script>

</body>
</html>
