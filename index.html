<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Adhu ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#ffe6eb,#ffd1dc);
overflow:hidden;
height:100vh;

}

.container{
position:relative;
z-index:10;

}

h1{
color:#ff3366;

}

.subtitle{

}

#counter{
font-size:22px;
font-weight:bold;

margin:20px;
}

input{
padding:12px;
font-size:18px;
border:none;

}

button{

background:#ff3366;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:fixed;
font-size:25px;
animation:float 10s linear infinite;
opacity:0.8;
}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-100px);
}

}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="music/Un_Vizhigalil.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>❤️ Happy Birthday Adhu ❤️</h1>

<div class="subtitle">
Choose the date our story began ❤️
</div>

<div id="counter"></div>

<input type="date" id="datePicker">

<br>

<button onclick="checkDate()">
Unlock My Heart ❤️
</button>

</div>

<script>

const startDate =
new Date("2024-09-30");

const today =
new Date();

const diff =
today - startDate;

const days =
Math.floor(diff/(1000*60*60*24));

document.getElementById("counter").innerHTML =
"❤️ Together for " + days + " Days ❤️";

for(let i=0;i<30;i++){

let heart =
document.createElement("div");

heart.innerHTML = "❤️";

heart.classList.add("heart");

heart.style.left =
Math.random()*100 + "vw";

heart.style.animationDelay =
Math.random()*10 + "s";

document.body.appendChild(heart);

}

function checkDate(){

let music =
document.getElementById("bgMusic");

music.play();

let selected =
document.getElementById("datePicker").value;

if(selected==="2024-09-30"){

setTimeout(function(){

window.location.href="menu.html";

},1000);

}else{

alert("Wrong date my love ❤️");

}

}

</script>

</body>

</html>
