<h2>Adhu ❤️</h2>

<div id="counter">0</div>

<script>

const startDate =
new Date("2024-09-30");

const today =
new Date();

const diff =
today-startDate;

const days =
Math.floor(diff/(1000*60*60*24));

document.getElementById("counter")
.innerHTML = days;

function checkDate(){

let selected =
document.getElementById("datePicker").value;

if(selected==="2024-09-30"){

window.location.href="menu.html";

}

}
