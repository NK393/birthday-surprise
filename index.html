<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World ❤️</title>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:black;
color:white;
text-align:center;
}

/* music fixed */
audio{
position:fixed;
top:10px;
left:10px;
z-index:999;
}

/* menu */
.menu{
padding:20px;
}

button{
display:block;
width:80%;
margin:15px auto;
padding:15px;
font-size:20px;
border:none;
border-radius:15px;
background:#ff4f88;
color:white;
cursor:pointer;
box-shadow:0 0 15px #ff4f88;
}

iframe{
width:100%;
height:90vh;
border:none;
margin-top:10px;
}

</style>
</head>

<body>

<!-- 🎵 MUSIC NEVER STOPS HERE -->
<audio id="bgMusic" controls loop>
<source src="music/Un_Vizhigalil.mp3" type="audio/mpeg">
</audio>

<h1>💖 Our World 💖</h1>

<div class="menu">
<button onclick="openPage('adhu.html')">1. Adhu</button>
<button onclick="openPage('childhood.html')">2. Childhood</button>
<button onclick="openPage('travel.html')">3. Travel</button>
<button onclick="openPage('us.html')">4. Us Together</button>
<button onclick="openPage('loveletter.html')">5. Love Letter</button>
</div>

<iframe id="viewer"></iframe>

<script>

// start music on first interaction
document.body.addEventListener("click", function(){
document.getElementById("bgMusic").play();
}, { once:true });

function openPage(page){
document.getElementById("viewer").src = page;
}

</script>

</body>
</html>
