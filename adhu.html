<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories 🎥</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:#ffcc80;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:10px;
    padding:10px;
}

/* VIDEO BOX */
.video-box{
    width:100%;
    aspect-ratio:1/1;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* NOTE */
.quote{
    margin:30px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffcc80;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>🎥 Memories 🎥</h1>

<div class="gallery" id="gallery"></div>

<div class="quote">
💛 Every memory is stored here forever ✨
</div>

<script>
const gallery = document.getElementById("gallery");

const folder = "videos/";

const videoFiles = [
"Snapchat-1001146950.mp4",

];

videoFiles.forEach(file => {

    const div = document.createElement("div");
    div.className = "video-box";

    const video = document.createElement("video");
    video.controls = true;

    // hide if broken
    video.onerror = () => {
        div.style.display = "none";
    };

    div.appendChild(video);
    gallery.appendChild(div);
});
</script>

</body>
</html>
