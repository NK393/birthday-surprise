<title>Our Love Memories ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* IMAGE GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:8px;
    padding:10px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
    transition:0.3s ease;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* LOVE QUOTE */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>
