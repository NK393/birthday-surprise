<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:6px;
    padding:10px;
}

/* IMAGE CARD */
.photo{
    display:flex;
    flex-direction:column;
}

.photo img{
    width:100%;
    height:190px;
    object-fit:cover;
    border-radius:12px;
    filter:blur(6px);
    transition:0.4s ease;
}

.photo img.loaded{
    filter:blur(0);
}

.caption{
    font-size:12px;
    color:#ffb6c1;
    margin-top:3px;
}

/* QUOTE */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>💕 Mine 💕</h1>

<div class="gallery" id="gallery"></div>

<div class="quote">
💌  
Every picture here is not just a memory, but a piece of my heart, where I have seen every shade of you. ❤️
</div>

<script>
const gallery = document.getElementById("gallery");

// total images (change this if needed)
const totalImages = 36;

// folder path
const folder = "images/Adhu/";

for(let i = 1; i <= totalImages; i++){
    
    const div = document.createElement("div");
    div.className = "photo";

    const img = document.createElement("img");
    img.src = folder + "image" + i + ".jpg";
    img.loading = "lazy";
    img.decoding = "async";

    const caption = document.createElement("div");
    caption.className = "caption";
    caption.innerText = "Memory " + i;

    // remove blur after load
    img.onload = () => {
        img.classList.add("loaded");
    };

    div.appendChild(img);
    div.appendChild(caption);
    gallery.appendChild(div);
}
</script>

</body>
</html>
