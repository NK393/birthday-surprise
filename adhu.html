<title>Mine ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:6px;
    padding:10px;
}

/* CARD */
.photo{
    display:flex;
    flex-direction:column;
}

/* IMAGE */
.photo img{
    width:100%;
    height:190px;
    object-fit:cover;
    border-radius:12px;

    transform:translateZ(0);
    will-change: transform;

    filter:blur(8px);
    transition:0.4s ease;
}

.photo img.loaded{
    filter:blur(0);
}

.photo img:hover{
    transform:scale(1.03);
}

/* CAPTION */
.caption{
    margin-top:4px;
    font-size:13px;
    color:#ffb6c1;
    padding:4px;
}

/* QUOTE */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>
