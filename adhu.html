<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
    gap:8px;
    padding:10px;
}

/* SQUARE CARD */
.photo{
    display:flex;
    flex-direction:column;
}

/* PERFECT SQUARE IMAGE */
.photo img{
    width:100%;
    aspect-ratio:1/1;   /* 🔥 THIS MAKES IT SQUARE */
    object-fit:cover;
    border-radius:12px;
    filter:blur(6px);
    transition:0.3s ease;
}

/* loaded effect */
.photo img.loaded{
    filter:blur(0);
}

/* hover */
.photo img:hover{
    transform:scale(1.03);
}

/* caption */
.caption{
    font-size:12px;
    color:#ffb6c1;
    margin-top:4px;
}

/* quote */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>💕 Mine 💕</h1>

<div class="gallery" id="gallery"></div>

<div class="quote">
💌  
Every picture here is not just a memory, but a piece of my heart, where I have seen every shade of you. ❤️
</div>

<script>
const gallery = document.getElementById("gallery");

const totalImages = 36;
const folder = "images/Adhu/";

for(let i = 1; i <= totalImages; i++){

    const div = document.createElement("div");
    div.className = "photo";

    const img = document.createElement("img");

    // 🔥 ensures proper ordered loading
    img.src = folder + "image" + i + ".jpg";

    img.loading = "lazy";
    img.decoding = "async";

    const caption = document.createElement("div");
    caption.className = "caption";
    caption.innerText = "Memory " + i;

    img.onload = () => {
        img.classList.add("loaded");
    };

    div.appendChild(img);
    div.appendChild(caption);
    gallery.appendChild(div);
}
</script>

</body>
</html>
