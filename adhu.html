<title>Mine ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));
    gap:6px;
    padding:10px;
}

/* SQUARE IMAGES */
.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:10px;
    display:block;
    transition:0.3s ease;
}

/* hover effect */
.gallery img:hover{
    transform:scale(1.05);
}

/* QUOTE */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>
