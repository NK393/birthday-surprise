<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Memories ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:6px;
    padding:10px;
}

/* IMAGE */
.gallery img{
    width:100%;
    height:190px;
    object-fit:cover;
    border-radius:12px;

    /* performance */
    transform:translateZ(0);
    will-change: transform;

    /* loading effect */
    filter:blur(8px);
    transition:0.4s ease;
}

/* when loaded */
.gallery img.loaded{
    filter:blur(0);
}

/* hover */
.gallery img:hover{
    transform:scale(1.03);
}

/* QUOTE */
.quote{
    margin:25px auto;
    padding:15px;
    max-width:700px;
    font-size:18px;
    color:#ffb6c1;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>💕 Our Memories 💕</h1>

<div class="gallery">

<img src="images/us/image1.jpg" loading="lazy" decoding="async">
