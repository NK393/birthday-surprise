<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us Together ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:20px 0;
    color:pink;
}

/* GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:8px;
    padding:10px;
}

/* IMAGE CARD */
.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;

    /* performance boost */
    image-rendering:auto;
    transform:translateZ(0);

    /* smooth loading effect */
    filter:blur(8px);
    transition:0.5s ease;
}

/* when loaded */
.gallery img.loaded{
    filter:blur(0);
    transform:scale(1);
}

/* hover effect */
.gallery img:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<h1>💕 Our Memories 💕</h1>

<div class="gallery">

<img src="images/us/IMG-20251005-WA0006.jpg" loading="lazy" decoding="async">
<img src="images/us/1000108695.jpg" loading="lazy" decoding="async">
<img src="images/us/1000111514.png" loading="lazy" decoding="async">
<img src="images/us/1000112023.jpg" loading="lazy" decoding="async">

<img src="images/us/IMG-20260301-WA0000.jpg" loading="lazy" decoding="async">

<img src="images/us/IMG_0715.JPG" loading="lazy" decoding="async">

<img src="images/us/IMG_3757.JPG" loading="lazy" decoding="async">

<script>
/* removes blur only after image loads */
document.querySelectorAll("img").forEach(img => {
    img.addEventListener("load", () => {
        img.classList.add("loaded");
    });
});
</script>
